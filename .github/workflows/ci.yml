name: Bilinc CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install editable test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run full test suite
        run: PYTHONPATH=src pytest -q tests/

      - name: Run import smoke
        run: python -c "import bilinc; print(f'bilinc {bilinc.__version__} imported successfully')"

      - name: Run SQLite CLI persistence smoke
        run: |
          bilinc --db ./ci-smoke.db commit --key smoke_key --value hello
          bilinc --db ./ci-smoke.db recall --key smoke_key

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package artifacts
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: bilinc-dist
          path: dist/*

  artifact-validation:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Download distribution artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: bilinc-dist
          path: dist/

      - name: Validate wheel
        run: pip install dist/*.whl

      - name: Validate sdist
        run: pip install dist/*.tar.gz

  postgres-integration:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: bilinc
          POSTGRES_PASSWORD: bilinc_test
          POSTGRES_DB: bilinc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,postgres]'

      - name: Run PostgreSQL integration tests
        env:
          BILINC_DB_URL: postgresql://bilinc:bilinc_test@localhost:5432/bilinc_test
        run: pytest -q tests/test_postgres_integration.py

  hermes-integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Bootstrap smoke (Hermes pack)
        run: |
          bilinc hermes bootstrap --hermes-home /tmp/hermes --db-path /tmp/bilinc.db --use-temp-db-for-smoke

      - name: Hermes integration tests
        run: |
          pytest -q tests/test_hermes_integration.py tests/smoke/test_mcp.py
