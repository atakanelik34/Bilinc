name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install editable test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full test suite
        run: PYTHONPATH=src pytest -q tests/

      - name: Run import smoke
        run: python -c "import bilinc; print(f'bilinc {bilinc.__version__} imported successfully')"

      - name: Run SQLite CLI persistence smoke
        run: |
          bilinc --db ./ci-smoke.db commit --key smoke_key --value hello
          bilinc --db ./ci-smoke.db recall --key smoke_key

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build package artifacts
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bilinc-dist
          path: dist/*

  artifact-validation:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: bilinc-dist
          path: dist

      - name: Validate wheel install
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "import bilinc; print(bilinc.__version__)"

      - name: Validate sdist install
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          pip install --upgrade pip
          pip install dist/*.tar.gz
          python -c "import bilinc; print(bilinc.__version__)"

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: bilinc_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bilinc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BILINC_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/bilinc_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PostgreSQL integration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Run PostgreSQL integration tests
        run: PYTHONPATH=src pytest -q tests/test_postgres_integration.py
